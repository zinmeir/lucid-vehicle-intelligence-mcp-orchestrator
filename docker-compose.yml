version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - timescaledb
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:password@timescaledb:5432/vehicle_db
      - REDIS_URL=redis://redis:6379/0

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=vehicle_db
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
